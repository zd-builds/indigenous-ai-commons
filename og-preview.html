<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; overflow: hidden; background: #0D0D0D; }

    .og {
      width: 1200px;
      height: 630px;
      background: #0D0D0D;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* Decorative background mark — large overlapping circles, faded */
    .bg-mark {
      position: absolute;
      right: -60px;
      top: 50%;
      transform: translateY(-50%);
      width: 520px;
      height: 520px;
      opacity: 0.07;
    }

    /* Left accent bar */
    .accent-bar {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 6px;
      background: linear-gradient(to bottom, #6B1F7A, #1A8C8A);
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 1;
      padding: 0 80px 0 72px;
      max-width: 820px;
    }

    .eyebrow {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #1A8C8A;
      margin-bottom: 24px;
    }

    .title {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 76px;
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 28px;
    }
    .title .indigenous { color: #8B3FA0; }
    .title .ai { color: #1A8C8A; }
    .title .commons { color: #FFFFFF; }

    .rule {
      width: 60px;
      height: 2px;
      background: linear-gradient(to right, #6B1F7A, #1A8C8A);
      margin-bottom: 24px;
    }

    .tagline {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 22px;
      font-weight: 300;
      color: #777777;
      line-height: 1.45;
      letter-spacing: -0.01em;
      margin-bottom: 0;
    }

    .url {
      position: absolute;
      bottom: 40px;
      right: 56px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #333333;
      letter-spacing: 0.04em;
      z-index: 1;
    }

    /* Foreground geometric mark — right side */
    .fg-mark {
      position: absolute;
      right: 80px;
      top: 50%;
      transform: translateY(-50%);
      width: 220px;
      height: 220px;
      z-index: 1;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="og">

    <div class="accent-bar"></div>

    <!-- Background decorative circles (large, faded) -->
    <svg class="bg-mark" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <circle cx="160" cy="200" r="160" fill="#6B1F7A"/>
      <circle cx="240" cy="200" r="160" fill="#1A8C8A"/>
    </svg>

    <!-- Main text content -->
    <div class="content">
      <p class="eyebrow">indigenousaicommons.org</p>
      <h1 class="title">
        <span class="indigenous">Indigenous</span><br>
        <span class="ai">AI</span> <span class="commons">Commons</span>
      </h1>
      <div class="rule"></div>
      <p class="tagline">a living index of AI resources<br>by and for Indigenous</p>
    </div>

    <!-- Foreground geometric mark -->
    <svg class="fg-mark" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <mask id="overlap-mask">
          <rect width="220" height="220" fill="black"/>
          <circle cx="90" cy="110" r="72" fill="white"/>
          <circle cx="130" cy="110" r="72" fill="white"/>
        </mask>
      </defs>
      <!-- Left circle -->
      <circle cx="90" cy="110" r="72" fill="none" stroke="#6B1F7A" stroke-width="2"/>
      <!-- Right circle -->
      <circle cx="130" cy="110" r="72" fill="none" stroke="#1A8C8A" stroke-width="2"/>
      <!-- Overlap fill -->
      <circle cx="90" cy="110" r="72" fill="#6B1F7A" opacity="0.15"/>
      <circle cx="130" cy="110" r="72" fill="#1A8C8A" opacity="0.15"/>
      <!-- Small center dot -->
      <circle cx="110" cy="110" r="4" fill="#ffffff" opacity="0.4"/>
    </svg>

    <span class="url">indigenousaicommons.org</span>
  </div>
</body>
</html>
